name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Web (type-check, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm --workspace apps/assistant-web run generate:api

      - name: Type-check
        run: npm run typecheck:web

      - name: Build
        env:
          NEXT_PUBLIC_ASSISTANT_API_URL: https://assistant-api-production-5210.up.railway.app
        run: npm run build:web

  backend:
    name: Backend (lint, test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: assistant_test
          POSTGRES_PASSWORD: assistant_test
          POSTGRES_DB: assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assistant_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: services/assistant-runtime/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "services/assistant-runtime[dev]"

      - name: Lint
        run: python -m ruff check services/assistant-runtime/src services/assistant-runtime/tests

      - name: Test (includes RLS conformance against real Postgres)
        env:
          ASSISTANT_TEST_DATABASE_URL: postgresql://assistant_test:assistant_test@localhost:5432/assistant_test
        run: python -m pytest services/assistant-runtime/tests

  web-docker:
    name: Web Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Build Railway web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_ASSISTANT_API_URL=https://assistant-api-production-5210.up.railway.app \
            -f apps/assistant-web/Dockerfile \
            .
