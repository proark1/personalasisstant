name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs when new commits land on the same PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, type-check, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun run audit

      - name: Format check
        run: bun run format:check

      # Lint is gated. Errors block; warnings are still allowed
      # (~940 `@typescript-eslint/no-explicit-any` flags being paid down).
      - name: Lint
        run: bun run lint

      # Type-check is gated now that the baseline is zero. New type
      # errors block the PR. (Strict-mode flags are being enabled
      # phase-by-phase in tsconfig.app.json; this guards the current
      # config.)
      - name: Type-check (no emit)
        run: bunx tsc --noEmit -p tsconfig.app.json

      - name: Test
        run: bun run test

      - name: Build
        env:
          # Build uses placeholder Supabase config — real values come
          # from the deploy environment, not CI.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
          VITE_SUPABASE_PROJECT_ID: placeholder
        run: bun run build

  edge-functions:
    name: Edge functions (deno check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.3

      - name: Type-check security-sensitive edge functions
        run: |
          set -e
          for fn in \
            supabase/functions/dori-execute-action/index.ts \
            supabase/functions/dori-plan-execute/index.ts \
            supabase/functions/generate-cancellation-email/index.ts \
            supabase/functions/send-push-notification/index.ts \
            supabase/functions/call-push-notification/index.ts \
            supabase/functions/push-delivery/index.ts \
            supabase/functions/briefing-dispatch-cron/index.ts \
            supabase/functions/plaid-sync-cron/index.ts \
            supabase/functions/trip-prep-cron/index.ts \
            supabase/functions/meeting-bot-reconciler-cron/index.ts
          do
            echo "::group::deno check $fn"
            deno check --no-lock "$fn"
            echo "::endgroup::"
          done

      - name: Type-check all edge functions
        continue-on-error: true # baseline-track; chat/shared helper typings are not clean yet
        run: |
          set -e
          fail=0
          for fn in supabase/functions/*/index.ts; do
            echo "::group::deno check $fn"
            if ! deno check --no-lock "$fn"; then
              fail=1
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Test shared edge function utilities
        run: deno test --allow-env --no-lock supabase/functions/_shared/
